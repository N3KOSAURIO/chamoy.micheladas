<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagenes/logo chamoy-04.png">
    <title>Pedido | Chamoy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           ESTILOS ESPECÍFICOS DEL PEDIDO
           ========================================= */
        .pedido-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .pedido-container h1 {
            text-align: center;
            color: var(--secondary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .pedido-container .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .pedido-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        .pedido-card h2 {
            color: var(--text-main);
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pedido-card h2 i {
            color: var(--primary);
        }

        /* Lista de productos en el resumen */
        .resumen-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .resumen-item:last-child {
            border-bottom: none;
        }

        .resumen-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .resumen-item .info {
            flex: 1;
        }

        .resumen-item .info h4 {
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .resumen-item .info small {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .resumen-item .cantidad {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 10px;
        }

        .resumen-item .subtotal {
            color: var(--secondary);
            font-weight: bold;
            font-size: 1rem;
            min-width: 60px;
            text-align: right;
        }

        /* Total general */
        .total-general {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-top: 15px;
            border-top: 2px solid var(--primary);
            font-size: 1.2rem;
        }

        .total-general .label {
            color: var(--text-main);
            font-weight: bold;
        }

        .total-general .amount {
            color: var(--secondary);
            font-size: 1.6rem;
            font-weight: bold;
        }

        /* Botón de envío */
        .btn-enviar {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-enviar:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 25px var(--shadow-color);
        }

        .btn-enviar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-volver {
            display: inline-block;
            padding: 10px 25px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-volver:hover {
            color: var(--text-main);
            border-color: var(--primary);
        }

        .btn-volver i {
            margin-right: 8px;
        }

        /* Estado vacío */
        .carrito-vacio {
            text-align: center;
            padding: 50px 20px;
        }

        .carrito-vacio i {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.3;
            margin-bottom: 20px;
            display: block;
        }

        .carrito-vacio h3 {
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .carrito-vacio p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .carrito-vacio .btn-ir-menu {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .carrito-vacio .btn-ir-menu:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .pedido-card {
                padding: 20px;
            }

            .resumen-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .resumen-item img {
                width: 40px;
                height: 40px;
            }

            .resumen-item .info h4 {
                font-size: 0.85rem;
            }

            .total-general {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .total-general .amount {
                font-size: 1.3rem;
            }

            .btn-enviar {
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================= -->
    <!-- HEADER - NAVEGACIÓN                          -->
    <!-- ============================================= -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="imagenes/logo chamoy-04.png" alt="Chamoy Logo" class="nav-logo">
            </a>

            <div class="menu-toggle" onclick="toggleMobileMenu()">
                <i class="fa-solid fa-bars"></i>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="reservas.html">Reservas</a></li>
            </ul>

            <div class="cart-icon-container" onclick="window.location.href='menu.html'">
                <i class="fa-solid fa-basket-shopping"></i>
                <span id="cart-count" class="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- ============================================= -->
    <!-- CONTENIDO PRINCIPAL                          -->
    <!-- ============================================= -->
    <main class="pedido-container">
        <a href="menu.html" class="btn-volver">
            <i class="fa-solid fa-arrow-left"></i> Seguir comprando
        </a>

        <h1>📋 Resumen de tu Pedido</h1>
        <p class="subtitle">Revisa los productos y confirma tu pedido</p>

        <div class="pedido-card" id="resumen-pedido">
            <!-- Aquí se renderiza el contenido con JavaScript -->
        </div>
    </main>

    <!-- ============================================= -->
    <!-- FOOTER                                       -->
    <!-- ============================================= -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Chamoy Micheladas &amp; Shots. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/chamoy_micheladas_shots/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.instagram.com/chamoy_micheladas_shots/" target="_blank"><i class="fa-brands fa-threads"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            </div>
        </div>
    </footer>

    <!-- ============================================= -->
    <!-- SCRIPTS                                      -->
    <!-- ============================================= -->
    <script src="cart.js"></script>
    <script src="whatsapp.js"></script>

    <script>
        // =============================================
        // MENÚ MÓVIL
        // =============================================
        function toggleMobileMenu() {
            const navLinks = document.querySelector('.nav-links');
            if (navLinks) navLinks.classList.toggle('active');
        }

        // =============================================
        // RENDERIZAR RESUMEN DEL PEDIDO
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const cart = JSON.parse(localStorage.getItem('CHAMOY_CART')) || [];
            const container = document.getElementById('resumen-pedido');

            // Actualizar contador del carrito
            const countElement = document.getElementById('cart-count');
            if (countElement) {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                countElement.innerText = totalItems;
                countElement.style.display = totalItems === 0 ? 'none' : 'inline-block';
            }

            // Si el carrito está vacío
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="carrito-vacio">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <h3>Tu carrito está vacío</h3>
                        <p>No tienes productos agregados. ¡Explora nuestro menú!</p>
                        <a href="menu.html" class="btn-ir-menu">
                            <i class="fa-solid fa-utensils"></i> Ver Menú
                        </a>
                    </div>
                `;
                return;
            }

            // Construir el HTML del resumen
            let html = `<h2><i class="fa-solid fa-receipt"></i> Productos (${cart.reduce((s, i) => s + i.quantity, 0)})</h2>`;
            let totalGeneral = 0;

            cart.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                totalGeneral += subtotal;
                const imgSrc = item.imgSrc || 'imagenes/placeholder.png';

                html += `
                    <div class="resumen-item">
                        <img src="${imgSrc}" alt="${item.name}" loading="lazy">
                        <div class="info">
                            <h4>${item.name}</h4>
                            <small>$${item.price.toLocaleString()} c/u</small>
                        </div>
                        <span class="cantidad">×${item.quantity}</span>
                        <span class="subtotal">$${subtotal.toLocaleString()}</span>
                    </div>
                `;
            });

            html += `
                <div class="total-general">
                    <span class="label">Total a pagar</span>
                    <span class="amount">$${totalGeneral.toLocaleString()}</span>
                </div>
                <!-- ============================================= -->
                <!-- CAMPOS DEL CLIENTE                           -->
                <!-- ============================================= -->

                <!-- Campo: Notas adicionales -->
                <div class="input-group">
                    <label for="order-notes">
                        <i class="fa-regular fa-pen-to-square"></i> Notas adicionales
                    </label>
                    <textarea id="order-notes" 
                            name="notas" 
                            rows="2" 
                            placeholder="Ej: Sin tomate, con queso extra..."
                            class="textarea-notes"></textarea>
                </div>

                <!-- Campo: Dirección de entrega con botón de ubicación -->
                <div class="input-group">
                    <label for="delivery-address">
                        <i class="fa-solid fa-location-dot"></i> Dirección de entrega
                    </label>
                    <div class="address-input-wrapper">
                        <input type="text" 
                            id="delivery-address" 
                            placeholder="Calle, número, barrio, referencias..." 
                            class="input-address">
                        <button type="button" id="btn-get-location" class="btn-location" title="Usar mi ubicación actual">
                            <i class="fa-solid fa-location-crosshairs"></i>
                        </button>
                    </div>
                    <small class="notes-hint">escribe tu direccón o dale al botón. <span class="location-hint">📌 Presiona el botón para usar tu ubicación actual.</span></small>
                </div>

                <!-- Campo: Teléfono de contacto -->
                <div class="input-group">
                    <label for="contact-phone">
                        <i class="fa-solid fa-phone"></i> Teléfono de contacto
                    </label>
                    <input type="tel" 
                        id="contact-phone" 
                        placeholder="300 123 4567" 
                        class="input-phone"
                        maxlength="12">
                    <small class="notes-hint">Número donde te podemos contactar si hay novedades.</small>
                    <small class="error-message" id="phone-error" style="color: #e74c3c; display: none; margin-top: 4px;">
                        <i class="fa-solid fa-circle-exclamation"></i> Ingresa un número válido de 10 dígitos (ej: 3001234567)
                    </small>
                </div>

                <!-- NUEVO: Campo: Nombre de quien recibe -->
                <div class="input-group">
                    <label for="receiver-name">
                        <i class="fa-regular fa-user"></i> ¿A nombre de quién reciben el pedido?
                    </label>
                    <input type="text" 
                        id="receiver-name" 
                        placeholder="Ej: María Pérez" 
                        class="input-name">
                    <small class="notes-hint">Indica el nombre de la persona que recibirá el pedido.</small>
                </div>

                <button class="btn-enviar" onclick="sendOrderWithNotes()">
                    <i class="fa-brands fa-whatsapp"></i> Enviar pedido a WhatsApp
                </button>
            `;

            container.innerHTML = html;
        });

        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('contact-phone');
            const errorMsg = document.getElementById('phone-error');

            // Función para limpiar el input (solo dígitos y espacios)
            function cleanPhoneNumber(value) {
                return value.replace(/[^\d\s]/g, '');
            }

            // Función para formatear el número mientras escribe (ej: 300 123 4567)
            function formatPhoneNumber(value) {
                const digits = value.replace(/\s/g, '');
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return digits.slice(0, 3) + ' ' + digits.slice(3);
                return digits.slice(0, 3) + ' ' + digits.slice(3, 6) + ' ' + digits.slice(6, 10);
            }

            // Validar número (solo dígitos, 10 dígitos, que empiece con 3)
            function isValidPhone(value) {
                const digits = value.replace(/\s/g, '');
                if (digits.length !== 10) return false;
                if (!/^\d{10}$/.test(digits)) return false;
                // Los números móviles en Colombia empiezan con 3
                if (!digits.startsWith('3')) return false;
                return true;
            }

            // Mostrar/ocultar error
            function setError(show) {
                if (show) {
                    errorMsg.style.display = 'block';
                    phoneInput.style.borderColor = '#e74c3c';
                    phoneInput.style.outline = '2px solid rgba(231, 76, 60, 0.3)';
                } else {
                    errorMsg.style.display = 'none';
                    phoneInput.style.borderColor = '';
                    phoneInput.style.outline = '';
                }
            }

            // Validar al perder el foco (blur)
            phoneInput.addEventListener('blur', function(e) {
                const value = this.value.trim();
                if (value === '') {
                    setError(false);
                    return;
                }
                const isValid = isValidPhone(value);
                setError(!isValid);
                if (!isValid && value.length > 0) {
                    // Si tiene menos de 10 dígitos, mostrar sugerencia
                    const digits = value.replace(/\s/g, '');
                    if (digits.length > 0 && digits.length < 10) {
                        errorMsg.textContent = '⚠️ Faltan ' + (10 - digits.length) + ' dígitos. Debe tener 10 dígitos.';
                        errorMsg.style.display = 'block';
                    } else if (digits.length === 10 && !digits.startsWith('3')) {
                        errorMsg.textContent = '⚠️ Los números móviles en Colombia empiezan con 3 (ej: 300, 301, 302...)';
                        errorMsg.style.display = 'block';
                    } else {
                        errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Ingresa un número válido de 10 dígitos (ej: 3001234567)';
                        errorMsg.style.display = 'block';
                    }
                }
            });

            // Validar al escribir (formateo y validación en tiempo real)
            phoneInput.addEventListener('input', function(e) {
                // Limpiar caracteres no válidos
                let value = cleanPhoneNumber(this.value);
                
                // Limitar a 10 dígitos
                const digits = value.replace(/\s/g, '');
                if (digits.length > 10) {
                    value = formatPhoneNumber(digits.slice(0, 10));
                } else {
                    value = formatPhoneNumber(digits);
                }
                
                this.value = value;

                // Validación en tiempo real si tiene más de 3 dígitos
                const currentDigits = value.replace(/\s/g, '');
                if (currentDigits.length >= 3) {
                    const isValid = isValidPhone(value);
                    setError(!isValid && currentDigits.length === 10);
                    if (currentDigits.length === 10 && !isValid) {
                        // Mensaje específico para error de prefijo
                        if (!currentDigits.startsWith('3')) {
                            errorMsg.textContent = '⚠️ Los números móviles en Colombia empiezan con 3';
                            errorMsg.style.display = 'block';
                        }
                    }
                } else {
                    setError(false);
                }
            });

            // Prevenir caracteres no numéricos en el input (excepto espacio)
            phoneInput.addEventListener('keydown', function(e) {
                // Permitir: teclas de control, espacio, números
                const key = e.key;
                if (key === 'Backspace' || key === 'Delete' || key === 'Tab' || key === 'Escape') return;
                if (key === ' ') return;
                if (!/^\d$/.test(key)) {
                    e.preventDefault();
                }
            });

            // Validación al pegar contenido
            phoneInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const clipboardData = e.clipboardData || window.clipboardData;
                const pastedData = clipboardData.getData('text');
                const digits = pastedData.replace(/\D/g, '');
                if (digits.length > 0) {
                    const formatted = formatPhoneNumber(digits.slice(0, 10));
                    this.value = formatted;
                    // Disparar evento input para validar
                    this.dispatchEvent(new Event('input'));
                }
            });

            // Función pública para validar desde el formulario
            window.validatePhone = function() {
                const value = phoneInput.value.trim();
                if (value === '') {
                    setError(false);
                    return true; // Campo vacío se considera válido (no requerido)
                }
                const isValid = isValidPhone(value);
                setError(!isValid);
                return isValid;
            };

            // Ejemplo de uso al enviar formulario
            // En tu evento submit:
            // if (!window.validatePhone()) {
            //     e.preventDefault();
            //     phoneInput.focus();
            //     return;
            // }
        });
        

        // =============================================
        // ENVIAR PEDIDO COMPLETO POR WHATSAPP
        // =============================================

        function sendOrderWithNotes() {
            // Obtener carrito
            const cart = JSON.parse(localStorage.getItem('CHAMOY_CART')) || [];
            if (cart.length === 0) {
                alert('❌ Tu carrito está vacío. Agrega productos primero.');
                return;
            }

            // Obtener datos del formulario
            const notes = document.getElementById('order-notes')?.value.trim() || 'Sin notas adicionales.';
            const address = document.getElementById('delivery-address')?.value.trim() || 'No especificada.';
            const phone = document.getElementById('contact-phone')?.value.trim() || 'No especificado.';

            // Validar campos obligatorios (opcional)
            if (!address || address === 'No especificada.') {
                const confirmar = confirm('⚠️ No has ingresado una dirección de entrega. ¿Quieres continuar de todos modos?');
                if (!confirmar) return;
            }

            // Construir mensaje
            let mensaje = '🍽️ *NUEVO PEDIDO - CHAMOY* 🍽️\n\n';
            let total = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                mensaje += `• ${item.name} ×${item.quantity} = $${subtotal.toLocaleString()}\n`;
            });

            mensaje += `\n💰 *Total: $${total.toLocaleString()}*`;
            mensaje += `\n\n📍 *Dirección:* ${address}`;
            mensaje += `\n📱 *Contacto:* ${phone}`;
            mensaje += `\n📝 *Notas:* ${notes}`;
            mensaje += `\n\n🙏 ¡Gracias por tu pedido! 🔥`;

            // Número de WhatsApp
            const phoneNumber = '573206650984';
            const url = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(mensaje)}`;

            // Abrir WhatsApp
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
